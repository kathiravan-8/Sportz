<!doctype html>
<html>
  <head>
    <title>Sportz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1 class="logo-text">
          <img src="sportz logo.jpg" alt="Sportz Logo" class="logo-img" />
          Sportz
        </h1>
      </div>
      <div class="header-search">
        <form
          class="header-search-form"
          action="#"
          method="get"
          aria-label="Site search"
        >
          <input
            type="search"
            name="q"
            placeholder="Search products"
            aria-label="Search"
          />
          <button type="submit" class="search-btn" aria-label="Search">
            <svg
              class="icon"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 15a5 5 0 110-10 5 5 0 010 10z"
              />
            </svg>
          </button>
        </form>
      </div>
      <nav class="header-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html" class="nav-icon" aria-label="Cart">
          <svg
            class="icon"
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M7 4h-2l-1 2H1v2h2l3.6 7.59-1.35 2.45A1 1 0 005.2 20h12.45v-2H6.42l.93-1.68L18 8v-.01L17 6H7zM7 18a2 2 0 104 0 2 2 0 00-4 0zm8 0a2 2 0 104 0 2 2 0 00-4 0z"
            />
          </svg>
        </a>
        <a href="account.html" class="nav-icon" aria-label="Account">
          <svg
            class="icon"
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
            />
          </svg>
        </a>
      </nav>
    </header>

    <section class="hero">
      <h2>Everything an Athlete Needs</h2>
      <p>Shop Football, Cricket, Fitness & More</p>
    </section>

    <section class="categories">
      <div class="card">
        <img src="football.jpg" alt="Football" class="card-img" /><span
          >Football</span
        >
      </div>
      <div class="card">
        <img src="cricket.jpg" alt="Cricket" class="card-img" /><span
          >Cricket</span
        >
      </div>
      <div class="card">
        <img src="tennis.jpg" alt="Tennis" class="card-img" /><span
          >Tennis</span
        >
      </div>
      <div class="card">
        <img src="hockey.jpg" alt="Hockey" class="card-img" /><span
          >Hockey</span
        >
      </div>
      <div class="card">
        <img src="baseball.jpg" alt="Baseball" class="card-img" /><span
          >Baseball</span
        >
      </div>
      <div class="card">
        <img src="more.jpg" alt="More" class="card-img" /><span>More</span>
      </div>
    </section>
  </body>
</html>
